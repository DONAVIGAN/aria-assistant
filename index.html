<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0a2e">
  <title>ARIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --a:#7c3aed;--a2:#4f46e5;--a3:#00d4ff;
      --t:#fff;--td:rgba(255,255,255,0.55);
      --b:rgba(255,255,255,0.15);
      --g:#00e676;--r:#ff4444;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0d0a2e;color:var(--t);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* SETUP */
    #setup{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;background:linear-gradient(160deg,#0d0a2e,#1a0a3e)}
    .slogo{font-family:'Syne',sans-serif;font-weight:800;font-size:52px;background:linear-gradient(135deg,var(--a3),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ssub{font-size:14px;color:var(--td);text-align:center;line-height:1.6;max-width:280px}
    .swrap{width:100%;max-width:340px}
    .slabel{font-size:12px;font-weight:600;color:var(--td);letter-spacing:.08em;display:block;margin-bottom:8px}
    .sinput{width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
    .sinput:focus{border-color:var(--a3)}
    .sinput::placeholder{color:rgba(255,255,255,0.3)}
    .sbtn{width:100%;max-width:340px;padding:16px;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 6px 30px rgba(124,58,237,0.4)}
    .sbtn:active{transform:scale(.97)}
    .snote{font-size:12px;color:var(--td);text-align:center;max-width:280px;line-height:1.6}

    /* APP */
    #app{display:none;flex-direction:column;height:100dvh}

    /* Header */
    header{flex-shrink:0;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;position:absolute;top:0;left:0;right:0;z-index:20}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;background:linear-gradient(135deg,var(--a3),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hright{display:flex;align-items:center;gap:14px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--g);box-shadow:0 0 10px var(--g);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .gbtn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6);padding:4px}
    .gbtn svg{width:22px;height:22px;display:block}

    /* Chat */
    #chat{flex:1;overflow-y:auto;padding:16px;padding-top:70px;-webkit-overflow-scrolling:touch;position:relative;z-index:5}

    /* Welcome */
    #welcome{
      position:relative;
      min-height:calc(100dvh - 80px);
      display:flex;flex-direction:column;
      align-items:center;justify-content:flex-end;
      padding-bottom:20px;
    }

      border-radius:0;
      z-index:0;
    }
    .welcome-content{
      position:relative;z-index:2;
      width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;
      padding:0 20px;
    }
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
    .chip{padding:10px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:22px;font-size:13px;font-weight:500;color:#fff;cursor:pointer;backdrop-filter:blur(10px)}
    .chip:active{background:rgba(124,58,237,0.4);border-color:var(--a)}

    /* Messages */
    .msg{display:flex;gap:10px;margin-bottom:14px;animation:fu .25s ease}
    .msg.user{flex-direction:row-reverse}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .av{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:700}
    .av.ai{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}
    .av.user{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2)}
    .bub{max-width:calc(100% - 50px);padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.65}
    .bub.ai{background:rgba(20,10,50,0.85);border:1px solid rgba(255,255,255,0.12);border-top-left-radius:5px;backdrop-filter:blur(16px);color:#fff}
    .bub.user{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border-top-right-radius:5px}
    .bub a{color:var(--a3);text-decoration:underline;word-break:break-all}
    .spkbtn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);margin-top:8px;display:flex;align-items:center;gap:4px;font-size:12px;font-family:'DM Sans',sans-serif}
    .spkbtn svg{width:18px;height:18px}
    .srcs{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1)}
    .srcslbl{font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:.06em;margin-bottom:6px}
    .srclink{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;background:rgba(255,255,255,0.06);margin-bottom:4px;text-decoration:none;border:1px solid rgba(255,255,255,0.08)}
    .srcnum{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .srctxt{font-size:12px;color:rgba(255,255,255,0.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .typdots{background:rgba(20,10,50,0.85);border:1px solid rgba(255,255,255,0.12);border-radius:18px;border-top-left-radius:5px;padding:14px 18px;display:flex;gap:5px;align-items:center;backdrop-filter:blur(16px)}
    .td{width:7px;height:7px;border-radius:50%;background:var(--a3);animation:tdot 1.2s infinite;opacity:.5}
    .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
    @keyframes tdot{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
    .searching{font-size:12px;color:var(--a3);margin-left:8px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

    /* Bottom */
    #bottom{flex-shrink:0;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));background:rgba(13,10,46,0.95);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);position:relative;z-index:10}
    .irow{display:flex;gap:10px;align-items:center}
    .iwrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:28px;padding:12px 18px;backdrop-filter:blur(12px);transition:border-color .2s}
    .iwrap:focus-within{border-color:rgba(0,212,255,0.5)}
    #txt{flex:1;background:none;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;resize:none;max-height:100px;min-height:22px;line-height:1.4}
    #txt::placeholder{color:rgba(255,255,255,0.35)}
    .rbtn{width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.5)}
    .rbtn:active{transform:scale(.9)}
    .rbtn svg{width:22px;height:22px;color:#fff;fill:currentColor}
    #micbtn.on{background:linear-gradient(135deg,var(--r),#c0392b);box-shadow:0 4px 20px rgba(255,68,68,0.5);animation:mblip 1s infinite}
    @keyframes mblip{0%,100%{box-shadow:0 4px 20px rgba(255,68,68,0.5)}50%{box-shadow:0 4px 30px rgba(255,68,68,0.8);transform:scale(1.08)}}
    .ltxt{text-align:center;font-size:12px;font-weight:600;color:var(--r);margin-top:6px;height:15px}

    /* Settings */
    #overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:none;align-items:flex-end}
    #overlay.open{display:flex}
    .sheet{width:100%;background:linear-gradient(180deg,#1a1040,#0d0a2e);border:1px solid rgba(255,255,255,0.1);border-radius:28px 28px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));animation:su .3s ease}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .shandle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 20px}
    .stitle{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:18px}
    .slbl2{font-size:12px;font-weight:600;color:var(--td);letter-spacing:.06em;display:block;margin-bottom:6px}
    .sfld{margin-bottom:14px}
    .sinput2{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:11px;padding:11px 13px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
    .sinput2:focus{border-color:var(--a3)}
    .sinput2 option{background:#1a1040;color:#fff}
    .savebtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px}
    .clearbtn{width:100%;padding:12px;border:1px solid rgba(255,100,100,0.3);border-radius:13px;background:none;color:rgba(255,100,100,0.7);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px}
    #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px 18px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
    #toast.show{opacity:1}
  </style>
</head>
<body>

<div id="setup">
  <div class="slogo">ARIA</div>
  <p class="ssub">Ton assistant IA vocal avec recherche web en temps reel</p>
  <div class="swrap">
    <label class="slabel">CLE API ANTHROPIC</label>
    <input type="password" class="sinput" id="skey" placeholder="sk-ant-...">
  </div>
  <button class="sbtn" onclick="startApp()">Demarrer ARIA</button>
  <p class="snote">Ta cle est stockee uniquement sur ton appareil.</p>
</div>

<div id="app">
  <header>
    <div class="logo">ARIA</div>
    <div class="hright">
      <div class="dot"></div>
      <button class="gbtn" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="welcome-bg"></div>
      <div class="welcome-content">
        <div class="chips">
          <div class="chip" onclick="send('Quelles sont les actualites importantes du jour ?')">&#x1F30D; Actualites du jour</div>
          <div class="chip" onclick="send('Quel est le taux de change dollar CFA XOF ?')">&#x1F4B1; Prix du dollar</div>
          <div class="chip" onclick="send('Quelle est la meteo a Niamey Niger ?')">&#x1F324; Meteo Niger</div>
          <div class="chip" onclick="send('Dernieres nouvelles tech et IA cette semaine ?')">&#x1F4F1; Tech news</div>
        </div>
      </div>
    </div>
  </div>

  <div id="bottom">
    <div class="irow">
      <div class="iwrap">
        <textarea id="txt" placeholder="Pose ta question..." rows="1" oninput="rsz(this)" onkeydown="kdown(event)"></textarea>
      </div>
      <button class="rbtn" id="micbtn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="rbtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="ltxt" id="ltxt"></div>
  </div>
</div>

<div id="overlay" onclick="oclick(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="stitle">Parametres</div>
    <div class="sfld">
      <label class="slbl2">CLE API ANTHROPIC</label>
      <input type="password" class="sinput2" id="skey2" placeholder="sk-ant-...">
    </div>
    <div class="sfld">
      <label class="slbl2">LANGUE</label>
      <select class="sinput2" id="slang">
        <option value="fr">Francais</option>
        <option value="en">English</option>
      </select>
    </div>
    <button class="savebtn" onclick="saveS()">Sauvegarder</button>
    <button class="clearbtn" onclick="clearH()">Effacer l historique</button>
  </div>
</div>

<div id="toast"></div>

<script>
var apiKey = localStorage.getItem('aria_key') || localStorage.getItem('aria_api_key') || '';
var lang = localStorage.getItem('aria_lang') || 'fr';
var TAVILY = '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';
var hist = [], recog = null, mic = false;

history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function() {
  history.pushState(null, '', window.location.href);
  if (document.getElementById('welcome').style.display === 'none') { clearH(); }
});

function boot() {
  if (apiKey) { showApp(); }
  else { document.getElementById('setup').style.display = 'flex'; }
}

function showApp() {
  document.getElementById('setup').style.display = 'none';
  var a = document.getElementById('app');
  a.style.display = 'flex'; a.style.flexDirection = 'column'; a.style.height = '100dvh';
  initMic();
}

function startApp() {
  var k = document.getElementById('skey').value.trim();
  if (!k.startsWith('sk-ant-')) { toast('Cle invalide'); return; }
  apiKey = k; localStorage.setItem('aria_key', k); showApp();
}

function initMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recog = new SR(); recog.continuous = false; recog.interimResults = true;
  recog.lang = lang==='fr'?'fr-FR':'en-US';
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){return r[0].transcript;}).join('');
    document.getElementById('txt').value = t; rsz(document.getElementById('txt'));
    if (e.results[0].isFinal) { stopMic(); sendMsg(); }
  };
  recog.onend = stopMic; recog.onerror = stopMic;
}

function toggleMic() {
  if (mic) { stopMic(); return; }
  if (!recog) { toast('Micro non supporte'); return; }
  mic = true; recog.lang = lang==='fr'?'fr-FR':'en-US'; recog.start();
  document.getElementById('micbtn').classList.add('on');
  document.getElementById('ltxt').textContent = 'Ecoute en cours...';
}
function stopMic() {
  mic = false; try{recog&&recog.stop();}catch(e){}
  document.getElementById('micbtn').classList.remove('on');
  document.getElementById('ltxt').textContent = '';
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.replace(/https?:\/\/\S+/g,'').replace(/[*#_`]/g,'').trim());
  u.lang = lang==='fr'?'fr-FR':'en-US';
  window.speechSynthesis.speak(u);
}

function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function kdown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function send(t){document.getElementById('txt').value=t;sendMsg();}

async function sendMsg() {
  var el=document.getElementById('txt'), q=el.value.trim();
  if (!q) return;
  el.value=''; rsz(el);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('welcome').style.display='none';
  addMsg('user',q); hist.push({role:'user',content:q});
  var tid=addTyping();
  try {
    var webData=await searchWeb(q);
    var res=await callClaude(q,webData);
    rmEl(tid); addMsg('ai',res.text,res.sources);
    hist.push({role:'assistant',content:res.text});
    speak(res.text);
  } catch(err) { rmEl(tid); addMsg('ai','Erreur : '+err.message); }
}

async function searchWeb(query) {
  try {
    var r=await fetch('https://api.tavily.com/search',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:TAVILY,query:query,search_depth:'basic',max_results:5,include_answer:true})});
    if(!r.ok) return null;
    return await r.json();
  } catch(e){return null;}
}

async function callClaude(query,webData) {
  var d=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var ctx='';
  if(webData&&webData.results&&webData.results.length>0){
    ctx='

RESULTATS WEB:
';
    if(webData.answer) ctx+='Resume: '+webData.answer+'

';
    webData.results.forEach(function(r,i){ctx+=(i+1)+'. '+r.title+'
   '+r.url+'
   '+(r.content||'').substring(0,250)+'

';});
  }
  var sys='Tu es ARIA, assistant IA vocal avec acces au web. Nous sommes le '+d+'.'+ctx+
    '
Reponds en francais, clairement et concisement (3-5 phrases). Utilise les resultats web si disponibles.'+
    '
Si tu cites des sources: SOURCES: [Nom|https://url.com]';
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,system:sys,messages:hist.slice(-10)})});
  if(!r.ok){var e=await r.json().catch(function(){return{};});if(r.status===401)throw new Error('Cle API invalide');throw new Error(e.error&&e.error.message?e.error.message:'Erreur '+r.status);}
  var data=await r.json();
  var raw=data.content[0]&&data.content[0].text?data.content[0].text:'';
  var parsed=parse(raw);
  if(webData&&webData.results&&parsed.sources.length===0){webData.results.slice(0,3).forEach(function(r){parsed.sources.push({name:r.title,url:r.url});});}
  return parsed;
}

function parse(raw){
  var sources=[],text=raw;
  var m=raw.match(/SOURCES:\s*(.+?)(
|$)/i);
  if(m){(m[1].match(/\[([^\]]+)\]/g)||[]).forEach(function(it){var p=it.replace(/[\[\]]/g,'').split('|');if(p[0])sources.push({name:p[0].trim(),url:(p[1]||'#').trim()});});text=raw.replace(/SOURCES:.+$/im,'').trim();}
  return{text:text,sources:sources};
}

function addMsg(role,text,sources){
  sources=sources||[];
  var chat=document.getElementById('chat');
  var div=document.createElement('div');div.className='msg '+role;
  var av=document.createElement('div');av.className='av '+role;av.textContent=role==='ai'?'A':'U';
  var bub=document.createElement('div');bub.className='bub '+role;
  bub.innerHTML='<p>'+text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/

/g,'</p><p>').replace(/
/g,'<br>')+'</p>';
  if(sources.length){var sd=document.createElement('div');sd.className='srcs';sd.innerHTML='<div class="srcslbl">SOURCES</div>';sources.forEach(function(s,i){var a=document.createElement('a');a.className='srclink';a.href=s.url;a.target='_blank';a.rel='noopener';a.innerHTML='<span class="srcnum">'+(i+1)+'</span><span class="srctxt">'+s.name+'</span>';sd.appendChild(a);});bub.appendChild(sd);}
  if(role==='ai'){var sb=document.createElement('button');sb.className='spkbtn';sb.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> Lire';sb.onclick=function(){speak(text);};bub.appendChild(sb);}
  div.appendChild(av);div.appendChild(bub);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  var chat=document.getElementById('chat'),id='ty'+Date.now();
  var div=document.createElement('div');div.className='msg ai';div.id=id;
  div.innerHTML='<div class="av ai">A</div><div class="typdots"><div class="td"></div><div class="td"></div><div class="td"></div><span class="searching">Recherche web...</span></div>';
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;return id;
}
function rmEl(id){var e=document.getElementById(id);if(e)e.remove();}
function openSheet(){document.getElementById('skey2').value=apiKey;document.getElementById('slang').value=lang;document.getElementById('overlay').classList.add('open');}
function oclick(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}
function saveS(){var k=document.getElementById('skey2').value.trim();if(k){apiKey=k;localStorage.setItem('aria_key',k);}lang=document.getElementById('slang').value;localStorage.setItem('aria_lang',lang);document.getElementById('overlay').classList.remove('open');toast('Sauvegardes');}
function clearH(){hist=[];document.getElementById('chat').querySelectorAll('.msg').forEach(function(e){e.remove();});document.getElementById('welcome').style.display='flex';toast('Retour accueil');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

boot();
</script>
</body>
</html>

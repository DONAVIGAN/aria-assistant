<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0a2e">
  <title>ARIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0a2e;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    
    /* PAGES */
    .page{display:none;flex-direction:column;min-height:100vh}
    .page.active{display:flex}

    /* SETUP */
    #page-setup{align-items:center;justify-content:center;padding:32px 24px;gap:20px;background:linear-gradient(160deg,#0d0a2e,#1a0a3e)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:52px;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{font-size:14px;color:rgba(255,255,255,.6);text-align:center;line-height:1.6;max-width:280px}
    .lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.08em;display:block;margin-bottom:8px}
    .wrap{width:100%;max-width:340px}
    input.field{width:100%;padding:14px 16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:14px;color:#fff;font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
    input.field:focus{border-color:#00d4ff}
    input.field::placeholder{color:rgba(255,255,255,.3)}
    .btn{width:100%;max-width:340px;padding:16px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer}
    .btn:active{opacity:.85}
    .note{font-size:12px;color:rgba(255,255,255,.4);text-align:center;max-width:280px;line-height:1.6}

    /* HOME */
    #page-home{background:#0d0a2e}
    .hero{width:100%;display:block;object-fit:cover}
    .chips-area{background:linear-gradient(180deg,#150d3a,#0d0a2e);padding:16px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .chip{padding:10px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:22px;font-size:13px;color:#fff;cursor:pointer}
    .chip:active{background:rgba(124,58,237,.4)}

    /* CHAT */
    #page-chat{background:#0d0a2e}
    .chat-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
    .chat-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .back-btn{background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:4px 8px}
    #msgs{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
    .msg{display:flex;gap:10px;margin-bottom:14px}
    .msg.user{flex-direction:row-reverse}
    .av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;font-family:'Syne',sans-serif}
    .av.ai{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
    .av.user{background:rgba(255,255,255,.12);color:#fff}
    .bub{max-width:calc(100% - 48px);padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.6}
    .bub.ai{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
    .bub.user{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
    .src-item{display:flex;align-items:center;gap:6px;margin-top:6px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.05);text-decoration:none}
    .src-n{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .src-t{font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dots{display:flex;gap:5px;align-items:center;padding:12px 14px;background:rgba(255,255,255,.08);border-radius:16px;border:1px solid rgba(255,255,255,.1)}
    .dot{width:6px;height:6px;border-radius:50%;background:#00d4ff;opacity:.4;animation:d 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes d{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
    .searching{font-size:11px;color:#00d4ff;margin-left:6px;animation:p 1.5s infinite}
    @keyframes p{0%,100%{opacity:.4}50%{opacity:1}}
    #bar{padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,255,255,.08);background:#0d0a2e}
    .bar-row{display:flex;gap:10px;align-items:center}
    .bar-input{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:26px;padding:10px 16px}
    .bar-input:focus-within{border-color:rgba(0,212,255,.5)}
    #txt{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;resize:none;max-height:80px;min-height:20px;line-height:1.4}
    #txt::placeholder{color:rgba(255,255,255,.35)}
    .rnd{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .rnd:active{transform:scale(.9)}
    .rnd svg{width:20px;height:20px;fill:#fff}
    #micbtn.on{background:linear-gradient(135deg,#ff4444,#c0392b)}
    .ltxt{text-align:center;font-size:11px;color:#ff4444;font-weight:600;height:14px;margin-top:4px}
  </style>
</head>
<body>

<!-- PAGE SETUP -->
<div class="page active" id="page-setup">
  <div class="logo">ARIA</div>
  <p class="sub">Assistant IA vocal avec recherche web en temps reel</p>
  <div class="wrap">
    <label class="lbl">CLE API ANTHROPIC</label>
    <input type="password" class="field" id="api-input" placeholder="sk-ant-...">
  </div>
  <button class="btn" onclick="demarrer()">Demarrer ARIA &rarr;</button>
  <p class="note">Ta cle est stockee uniquement sur ton appareil.</p>
</div>

<!-- PAGE HOME -->
<div class="page" id="page-home">
  <img class="hero" src="robot.jpg" alt="ARIA">
  <div class="chips-area">
    <div class="chips">
      <div class="chip" onclick="poser('Actualites importantes du jour ?')">&#127757; Actualites</div>
      <div class="chip" onclick="poser('Taux de change dollar CFA XOF ?')">&#128177; Dollar</div>
      <div class="chip" onclick="poser('Meteo Niamey Niger ?')">&#127780; Meteo Niger</div>
      <div class="chip" onclick="poser('Dernieres news tech et IA ?')">&#128241; Tech news</div>
    </div>
  </div>
</div>

<!-- PAGE CHAT -->
<div class="page" id="page-chat">
  <div class="chat-header">
    <div class="chat-logo">ARIA</div>
    <button class="back-btn" onclick="goHome()">&#8592; Accueil</button>
  </div>
  <div id="msgs"></div>
  <div id="bar">
    <div class="bar-row">
      <div class="bar-input">
        <textarea id="txt" placeholder="Pose ta question..." rows="1" oninput="rsz(this)" onkeydown="kdn(event)"></textarea>
      </div>
      <button class="rnd" id="micbtn" onclick="mic()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="rnd" onclick="envoyer()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="ltxt" id="ltxt"></div>
  </div>
</div>

<script>
var KEY = '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';
var TAVILY = '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';
var hist = [], recog = null, ismic = false;

// Navigation
function show(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// Boot
show('page-home');

// Setup
function demarrer() {
  var k = document.getElementById('api-input').value.trim();
  if (k.length < 10) { alert('Veuillez entrer votre cle API'); return; }
  KEY = k;
  localStorage.setItem('aria_key', k);
  show('page-home');
}

// Navigation
function goHome() { hist = []; show('page-home'); }
function poser(t) { document.getElementById('txt').value = t; show('page-chat'); envoyer(); }

// Mic
(function(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recog = new SR();
  recog.continuous = false; recog.interimResults = true; recog.lang = 'fr-FR';
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){return r[0].transcript;}).join('');
    document.getElementById('txt').value = t; rsz(document.getElementById('txt'));
    if (e.results[0].isFinal) { stopm(); envoyer(); }
  };
  recog.onend = stopm; recog.onerror = stopm;
})();

function mic() {
  if (ismic) { stopm(); return; }
  if (!recog) { alert('Micro non supporte'); return; }
  show('page-chat');
  ismic = true; recog.start();
  document.getElementById('micbtn').classList.add('on');
  document.getElementById('ltxt').textContent = 'Ecoute...';
}
function stopm() {
  ismic = false; try{recog&&recog.stop();}catch(e){}
  document.getElementById('micbtn').classList.remove('on');
  document.getElementById('ltxt').textContent = '';
}

function speak(t) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t.replace(/https?:\/\/\S+/g,'').replace(/[*#_`]/g,''));
  u.lang = 'fr-FR'; window.speechSynthesis.speak(u);
}

function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}
function kdn(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();envoyer();}}

async function envoyer() {
  var el = document.getElementById('txt'), q = el.value.trim();
  if (!q) return;
  el.value = ''; rsz(el);
  show('page-chat');
  window.speechSynthesis && window.speechSynthesis.cancel();
  ajouterMsg('user', q);
  hist.push({role:'user', content:q});
  var tid = ajouterTyping();
  try {
    var web = await chercher(q);
    var rep = await claude(q, web);
    suppr(tid);
    ajouterMsg('ai', rep.texte, rep.sources);
    hist.push({role:'assistant', content:rep.texte});
    speak(rep.texte);
  } catch(err) {
    suppr(tid);
    ajouterMsg('ai', 'Erreur : ' + err.message);
  }
}

async function chercher(q) {
  try {
    var r = await fetch('https://api.tavily.com/search', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({api_key:TAVILY, query:q, search_depth:'basic', max_results:5, include_answer:true})
    });
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

async function claude(q, web) {
  var d = new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var ctx = '';
  if (web && web.results && web.results.length) {
    ctx = '

RESULTATS WEB:
';
    if (web.answer) ctx += 'Resume: ' + web.answer + '

';
    web.results.forEach(function(r,i){ ctx += (i+1)+'. '+r.title+'
   '+r.url+'
   '+(r.content||'').substring(0,200)+'

'; });
  }
  var sys = 'Tu es ARIA, assistant IA vocal. Nous sommes le '+d+'.'+ctx+'
Reponds en francais, concisement (3-5 phrases). Sources a la fin: SOURCES: [Nom|url]';
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:1024, system:sys, messages:hist.slice(-10)})
  });
  if (!r.ok) { var e=await r.json().catch(function(){return{};}); throw new Error(e.error&&e.error.message?e.error.message:'Erreur '+r.status); }
  var data = await r.json();
  var raw = data.content[0] ? data.content[0].text : '';
  return parser(raw, web);
}

function parser(raw, web) {
  var sources = [], text = raw;
  var m = raw.match(/SOURCES:\s*(.+?)(
|$)/i);
  if (m) {
    (m[1].match(/\[([^\]]+)\]/g)||[]).forEach(function(it){
      var p = it.replace(/[\[\]]/g,'').split('|');
      if(p[0]) sources.push({n:p[0].trim(), u:(p[1]||'#').trim()});
    });
    text = raw.replace(/SOURCES:.+$/im,'').trim();
  }
  if (web && web.results && !sources.length) {
    web.results.slice(0,3).forEach(function(r){ sources.push({n:r.title, u:r.url}); });
  }
  return {texte:text, sources:sources};
}

function ajouterMsg(role, text, sources) {
  sources = sources || [];
  var msgs = document.getElementById('msgs');
  var div = document.createElement('div'); div.className = 'msg '+role;
  var av = document.createElement('div'); av.className = 'av '+role; av.textContent = role==='ai'?'A':'U';
  var bub = document.createElement('div'); bub.className = 'bub '+role;
  bub.innerHTML = '<p>'+text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/

/g,'</p><p>').replace(/
/g,'<br>')+'</p>';
  if (sources.length) {
    sources.forEach(function(s,i){
      var a = document.createElement('a'); a.className='src-item'; a.href=s.u; a.target='_blank'; a.rel='noopener';
      a.innerHTML = '<span class="src-n">'+(i+1)+'</span><span class="src-t">'+s.n+'</span>';
      bub.appendChild(a);
    });
  }
  div.appendChild(av); div.appendChild(bub);
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}

function ajouterTyping() {
  var msgs = document.getElementById('msgs'), id = 'ty'+Date.now();
  var div = document.createElement('div'); div.className='msg ai'; div.id=id;
  div.innerHTML = '<div class="av ai">A</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="searching">Recherche...</span></div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function suppr(id){ var e=document.getElementById(id); if(e) e.remove(); }
</script>
</body>
</html>
